<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#111111">
  <title>FlipOff. — Free Split-Flap Display for Any TV</title>
  <style>
/* reset.css */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  height: 100%;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  background: #E8E8E8;
  color: #111;
  overflow-x: hidden;
}

a {
  color: inherit;
  text-decoration: none;
}

button {
  font: inherit;
  cursor: pointer;
  border: none;
  outline: none;
}

input {
  font: inherit;
  border: none;
  outline: none;
}


/* layout.css */
/* Page Frame — mock browser window */
.page-frame {
  max-width: 1280px;
  margin: 24px auto;
  background: #F5F5F5;
  border-radius: 16px;
  box-shadow: 0 8px 40px rgba(0, 0, 0, 0.12);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* Header */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 36px;
  height: 60px;
  flex-shrink: 0;
}

.header-logo {
  font-size: 20px;
  font-weight: 800;
  letter-spacing: -0.3px;
}

.header-nav {
  display: flex;
  align-items: center;
  gap: 28px;
}

.header-nav a {
  font-size: 14px;
  font-weight: 500;
  color: #666;
  transition: color 0.2s;
}

.header-nav a:hover {
  color: #000;
}

.volume-icon {
  display: flex;
  align-items: center;
  justify-content: center;
  background: none;
  color: #666;
  padding: 4px;
  transition: color 0.2s;
}

.volume-icon:hover {
  color: #000;
}

.volume-icon.muted svg path:last-child,
.volume-icon.muted svg path:nth-child(2) {
  display: none;
}

/* Board Section */
.board-section {
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 24px 24px 32px;
}

/* Fullscreen: hide header+hero, board fills viewport */
.fullscreen-active .header {
  display: none;
}

.fullscreen-active .board-section {
  padding: 0;
  height: 100vh;
  align-items: center;
}


/* board.css */
/* Board Container */
.board {
  --tile-size: clamp(36px, 4.2vw, 62px);
  --tile-gap: clamp(3px, 0.3vw, 5px);

  position: relative;
  background: #1A1A1A;
  border-radius: 16px;
  padding: 28px 48px 40px;
  width: 100%;
  box-shadow:
    0 -4px 20px rgba(0, 0, 0, 0.1);
  overflow: hidden;
}

/* Tile Grid */
.tile-grid {
  display: grid;
  grid-template-columns: repeat(var(--grid-cols, 22), var(--tile-size));
  grid-template-rows: repeat(var(--grid-rows, 5), var(--tile-size));
  gap: var(--tile-gap);
  justify-content: center;
}

/* Accent Squares — small stacked blocks in top corners */
.accent-bar {
  position: absolute;
  top: 30px;
  display: flex;
  flex-direction: column;
  gap: 3px;
  z-index: 5;
}

.accent-bar-left {
  left: 18px;
}

.accent-bar-right {
  right: 18px;
}

.accent-segment {
  width: 14px;
  height: 14px;
  border-radius: 2px;
  transition: background-color 0.5s ease;
}

/* Keyboard Shortcut Indicator */
.keyboard-hint {
  position: absolute;
  bottom: 12px;
  left: 16px;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.08);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  color: rgba(255, 255, 255, 0.35);
  cursor: pointer;
  transition: background 0.2s;
}

.keyboard-hint:hover {
  background: rgba(255, 255, 255, 0.15);
}

/* Shortcuts Overlay */
.shortcuts-overlay {
  display: none;
  position: absolute;
  bottom: 48px;
  left: 16px;
  background: rgba(0, 0, 0, 0.92);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 8px;
  padding: 12px 16px;
  font-size: 12px;
  color: rgba(255, 255, 255, 0.7);
  z-index: 10;
  min-width: 180px;
}

.shortcuts-overlay.visible {
  display: block;
}

.shortcuts-overlay div {
  display: flex;
  justify-content: space-between;
  padding: 4px 0;
}

.shortcuts-overlay kbd {
  background: rgba(255, 255, 255, 0.1);
  padding: 1px 6px;
  border-radius: 3px;
  font-family: inherit;
  font-size: 11px;
  margin-left: 16px;
}

/* Scroll indicator at bottom of board */
.board::after {
  content: '';
  position: absolute;
  bottom: 12px;
  left: 50%;
  transform: translateX(-50%);
  width: 40px;
  height: 4px;
  border-radius: 2px;
  background: rgba(255, 255, 255, 0.15);
}


/* tile.css */
/* Tile Wrapper */
.tile {
  width: var(--tile-size);
  height: var(--tile-size);
  perspective: 400px;
  background: #111;
  border-radius: 3px;
}

/* Inner Container (transform target) */
.tile-inner {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
}

/* Tile Faces */
.tile-front,
.tile-back {
  position: absolute;
  inset: 1px;
  backface-visibility: hidden;
  background: #222;
  border-radius: 2px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow:
    inset 0 1px 3px rgba(0, 0, 0, 0.5),
    inset 0 -1px 1px rgba(255, 255, 255, 0.02);
  overflow: hidden;
}

.tile-front span,
.tile-back span {
  font-size: calc(var(--tile-size) * 0.52);
  font-weight: 700;
  color: #FFFFFF;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  line-height: 1;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
}

.tile-back {
  transform: rotateX(180deg);
}

/* Horizontal Split Line — subtle mechanical seam */
.tile-front::after,
.tile-back::after {
  content: '';
  position: absolute;
  left: 0;
  right: 0;
  top: 50%;
  height: 1px;
  background: rgba(0, 0, 0, 0.3);
  pointer-events: none;
}

/* Highlight Sweep (metallic reflection during flip) */
.tile-front::before,
.tile-back::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(
    180deg,
    transparent 0%,
    rgba(255, 255, 255, 0.08) 45%,
    rgba(255, 255, 255, 0.15) 50%,
    rgba(255, 255, 255, 0.08) 55%,
    transparent 100%
  );
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.15s;
}

/* 3D Flip Animation */
.tile-inner.flipping {
  animation: tileFlip var(--flip-duration, 300ms) ease-in-out forwards;
}

.tile-inner.flipping .tile-front::before,
.tile-inner.flipping .tile-back::before {
  opacity: 1;
}

@keyframes tileFlip {
  0% {
    transform: rotateX(0deg);
  }
  50% {
    transform: rotateX(-90deg);
  }
  100% {
    transform: rotateX(-180deg);
  }
}

/* GPU compositing hint during animation only */
.tile-inner.flipping,
.tile.scrambling .tile-inner {
  will-change: transform;
}


/* responsive.css */
/* Large screens / 4K TVs */
@media (min-width: 2000px) {
  .board {
    --tile-size: 65px;
    --tile-gap: 5px;
    padding: 36px 36px 48px;
  }

  .page-frame {
    max-width: 1600px;
  }

}

/* Standard desktop */
@media (max-width: 1200px) {
  .board {
    --tile-size: clamp(32px, 4vw, 50px);
  }


  .page-frame {
    margin: 16px;
  }
}

/* Tablet */
@media (max-width: 900px) {
  .board {
    --tile-size: clamp(26px, 4.5vw, 40px);
    padding: 20px 16px 32px;
    border-radius: 12px;
  }

  .page-frame {
    margin: 12px;
    border-radius: 12px;
  }

  .header {
    padding: 14px 20px;
  }




  .accent-segment {
    width: 12px;
    height: 12px;
  }
}

/* Mobile */
@media (max-width: 600px) {
  .board {
    --tile-size: clamp(18px, 4vw, 28px);
    --tile-gap: 2px;
    padding: 12px 8px 24px;
  }

  .page-frame {
    margin: 8px;
    border-radius: 10px;
  }

  .header {
    padding: 10px 16px;
  }

  .header-logo {
    font-size: 16px;
  }

  .header-nav a {
    font-size: 12px;
  }






  .accent-bar {
    display: none;
  }

  .keyboard-hint {
    display: none;
  }
}

/* Fullscreen mode */
:fullscreen .page-frame {
  max-width: none;
  margin: 0;
  border-radius: 0;
  min-height: 100vh;
  box-shadow: none;
  background: #111;
}

:fullscreen .header,
:fullscreen .hero {
  display: none !important;
}

:fullscreen .board-section {
  height: 100vh;
  width: 100vw;
  display: flex;
  align-items: center;
  justify-content: center;
}

:fullscreen .board {
  border-radius: 0;
  box-shadow: none;
  --tile-size: clamp(44px, 4vw, 70px);
}



/* ── Editor ─────────────────────────────────────────────────────────────── */
.editor-section {
  border-top: 1px solid #E4E4E4;
  padding: 28px 32px 48px;
  background: #F9F9F9;
}

.editor-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 20px;
}

.editor-section h2 {
  font-size: 16px;
  font-weight: 700;
  letter-spacing: -0.2px;
  color: #111;
  margin-bottom: 3px;
}

.editor-subtitle {
  font-size: 12px;
  color: #AAA;
}

.messages-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.message-card {
  display: grid;
  grid-template-columns: 22px 1fr auto;
  align-items: start;
  gap: 10px;
  background: #fff;
  border: 1.5px solid #E8E8E8;
  border-radius: 10px;
  padding: 10px 10px 10px 14px;
  transition: border-color 0.15s;
}

.message-card:hover { border-color: #CCC; }
.message-card.is-active { border-color: #111; }

.message-card-num {
  font-size: 11px;
  font-weight: 700;
  color: #CCC;
  padding-top: 6px;
  text-align: right;
}
.message-card.is-active .message-card-num { color: #111; }

.message-rows { display: flex; flex-direction: column; gap: 2px; }

.message-row {
  display: flex;
  align-items: center;
  gap: 6px;
}

.message-row input {
  flex: 1;
  font-size: 13px;
  font-weight: 600;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  text-transform: uppercase;
  letter-spacing: 0.4px;
  color: #111;
  background: transparent;
  border: 1px solid transparent;
  border-radius: 5px;
  padding: 4px 7px;
  transition: background 0.15s, border-color 0.15s;
}

.message-row input:focus {
  background: #F4F4F4;
  border-color: #DDD;
  outline: none;
}

.message-row input::placeholder {
  color: #DDD;
  font-weight: 400;
  text-transform: none;
  letter-spacing: 0;
  font-size: 12px;
}

.char-count {
  font-size: 10px;
  color: #DDD;
  min-width: 20px;
  text-align: right;
  font-variant-numeric: tabular-nums;
}
.char-count.over { color: #E33; font-weight: 700; }

.message-card-actions {
  display: flex;
  flex-direction: column;
  gap: 2px;
  padding-top: 2px;
}

.btn-icon {
  width: 28px;
  height: 28px;
  border-radius: 6px;
  background: none;
  border: none;
  color: #CCC;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
  flex-shrink: 0;
}
.btn-icon:hover { background: #F0F0F0; color: #555; }
.btn-icon.danger:hover { background: #FFF0F0; color: #E00; }
.btn-icon:disabled { opacity: 0.3; pointer-events: none; }

.btn-add-message {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  background: #EFEFEF;
  color: #333;
  font-size: 13px;
  font-weight: 600;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  transition: background 0.2s;
  flex-shrink: 0;
}
.btn-add-message:hover { background: #E4E4E4; }

:fullscreen .editor-section { display: none !important; }


.btn-toggle-editor {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 13px;
  background: #F0F0F0;
  color: #444;
  font-size: 13px;
  font-weight: 600;
  border-radius: 7px;
  border: none;
  cursor: pointer;
  transition: background 0.2s, color 0.2s;
}
.btn-toggle-editor:hover {
  background: #E4E4E4;
}
.btn-toggle-editor.is-open {
  background: #111;
  color: #fff;
}

class Tile {
  constructor(row, col) {
    this.row = row;
    this.col = col;
    this.currentChar = ' ';
    this.isAnimating = false;
    this._scrambleTimer = null;

    // Build DOM
    this.el = document.createElement('div');
    this.el.className = 'tile';

    this.innerEl = document.createElement('div');
    this.innerEl.className = 'tile-inner';

    this.frontEl = document.createElement('div');
    this.frontEl.className = 'tile-front';
    this.frontSpan = document.createElement('span');
    this.frontEl.appendChild(this.frontSpan);

    this.backEl = document.createElement('div');
    this.backEl.className = 'tile-back';
    this.backSpan = document.createElement('span');
    this.backEl.appendChild(this.backSpan);

    this.innerEl.appendChild(this.frontEl);
    this.innerEl.appendChild(this.backEl);
    this.el.appendChild(this.innerEl);
  }

  setChar(char) {
    this.currentChar = char;
    this.frontSpan.textContent = char === ' ' ? '' : char;
    this.backSpan.textContent = '';
    this.frontEl.style.backgroundColor = '';
  }

  scrambleTo(targetChar, delay) {
    if (targetChar === this.currentChar) return;

    // Cancel any in-progress animation
    if (this._scrambleTimer) {
      clearInterval(this._scrambleTimer);
      this._scrambleTimer = null;
    }
    this.isAnimating = true;

    setTimeout(() => {
      this.el.classList.add('scrambling');
      let scrambleCount = 0;
      const maxScrambles = 10 + Math.floor(Math.random() * 4);
      const scrambleInterval = 70;

      this._scrambleTimer = setInterval(() => {
        // Random character
        const randChar = CHARSET[Math.floor(Math.random() * CHARSET.length)];
        this.frontSpan.textContent = randChar === ' ' ? '' : randChar;

        // Cycle background color
        const color = SCRAMBLE_COLORS[scrambleCount % SCRAMBLE_COLORS.length];
        this.frontEl.style.backgroundColor = color;

        // Briefly change text color for contrast on light backgrounds
        if (color === '#FFFFFF' || color === '#FFCC00') {
          this.frontSpan.style.color = '#111';
        } else {
          this.frontSpan.style.color = '';
        }

        scrambleCount++;

        if (scrambleCount >= maxScrambles) {
          clearInterval(this._scrambleTimer);
          this._scrambleTimer = null;

          // Reset colors
          this.frontEl.style.backgroundColor = '';
          this.frontSpan.style.color = '';

          // Set the final character directly (skip 3D flip for reliability)
          // Use a brief opacity flash to simulate the flip settle
          this.frontSpan.textContent = targetChar === ' ' ? '' : targetChar;

          // Quick flash effect: brief scale transform
          this.innerEl.style.transition = `transform ${FLIP_DURATION}ms ease-in-out`;
          this.innerEl.style.transform = 'perspective(400px) rotateX(-8deg)';

          setTimeout(() => {
            this.innerEl.style.transform = '';
            setTimeout(() => {
              this.innerEl.style.transition = '';
              this.el.classList.remove('scrambling');
              this.currentChar = targetChar;
              this.isAnimating = false;
            }, FLIP_DURATION);
          }, FLIP_DURATION / 2);
        }
      }, scrambleInterval);
    }, delay);
  }
}

class SoundEngine {
  constructor() {
    this.ctx = null;
    this.muted = false;
    this._initialized = false;
    this._audioBuffer = null;
    this._currentSource = null;
  }

  async init() {
    if (this._initialized) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    this._initialized = true;

    // Decode the embedded audio clip
    try {
      const binaryStr = atob(FLAP_AUDIO_BASE64);
      const bytes = new Uint8Array(binaryStr.length);
      for (let i = 0; i < binaryStr.length; i++) {
        bytes[i] = binaryStr.charCodeAt(i);
      }
      this._audioBuffer = await this.ctx.decodeAudioData(bytes.buffer);
    } catch (e) {
      console.warn('Failed to decode flap audio:', e);
    }
  }

  resume() {
    if (this.ctx && this.ctx.state === 'suspended') {
      this.ctx.resume();
    }
  }

  toggleMute() {
    this.muted = !this.muted;
    return this.muted;
  }

  /**
   * Play the full transition sound once.
   * This is a single recorded clip of a split-flap board transition,
   * played once per message change (not per tile).
   */
  playTransition() {
    if (!this.ctx || !this._audioBuffer || this.muted) return;
    this.resume();

    // Stop any currently playing transition sound
    if (this._currentSource) {
      try {
        this._currentSource.stop();
      } catch (e) {
        // ignore if already stopped
      }
    }

    const source = this.ctx.createBufferSource();
    source.buffer = this._audioBuffer;

    const gain = this.ctx.createGain();
    gain.gain.value = 0.8;

    source.connect(gain);
    gain.connect(this.ctx.destination);

    source.start(0);
    this._currentSource = source;

    source.onended = () => {
      if (this._currentSource === source) {
        this._currentSource = null;
      }
    };
  }

  /** Get the duration of the transition audio clip in ms */
  getTransitionDuration() {
    if (this._audioBuffer) {
      return this._audioBuffer.duration * 1000;
    }
    return 3800; // fallback
  }

  // Keep this for API compatibility but it now plays the full transition
  scheduleFlaps() {
    this.playTransition();
  }
}

class Board {
  constructor(containerEl, soundEngine) {
    this.cols = GRID_COLS;
    this.rows = GRID_ROWS;
    this.soundEngine = soundEngine;
    this.isTransitioning = false;
    this.tiles = [];
    this.currentGrid = [];
    this.accentIndex = 0;

    // Build board DOM
    this.boardEl = document.createElement('div');
    this.boardEl.className = 'board';
    this.boardEl.style.setProperty('--grid-cols', this.cols);
    this.boardEl.style.setProperty('--grid-rows', this.rows);

    // Left accent squares (2 small stacked blocks)
    this.leftBar = this._createAccentBar('accent-bar-left');
    this.boardEl.appendChild(this.leftBar);

    // Tile grid
    this.gridEl = document.createElement('div');
    this.gridEl.className = 'tile-grid';

    for (let r = 0; r < this.rows; r++) {
      const row = [];
      const charRow = [];
      for (let c = 0; c < this.cols; c++) {
        const tile = new Tile(r, c);
        tile.setChar(' ');
        this.gridEl.appendChild(tile.el);
        row.push(tile);
        charRow.push(' ');
      }
      this.tiles.push(row);
      this.currentGrid.push(charRow);
    }

    this.boardEl.appendChild(this.gridEl);

    // Right accent squares
    this.rightBar = this._createAccentBar('accent-bar-right');
    this.boardEl.appendChild(this.rightBar);

    // Keyboard hint icon (bottom-left)
    const hint = document.createElement('div');
    hint.className = 'keyboard-hint';
    hint.textContent = 'N';
    hint.title = 'Keyboard shortcuts';
    hint.addEventListener('click', (e) => {
      e.stopPropagation();
      const overlay = this.boardEl.querySelector('.shortcuts-overlay');
      if (overlay) overlay.classList.toggle('visible');
    });
    this.boardEl.appendChild(hint);

    // Shortcuts overlay
    const overlay = document.createElement('div');
    overlay.className = 'shortcuts-overlay';
    overlay.innerHTML = `
      <div><span>Next message</span><kbd>Enter</kbd></div>
      <div><span>Previous</span><kbd>\u2190</kbd></div>
      <div><span>Fullscreen</span><kbd>F</kbd></div>
      <div><span>Mute</span><kbd>M</kbd></div>
    `;
    this.boardEl.appendChild(overlay);

    containerEl.appendChild(this.boardEl);
    this._updateAccentColors();
  }

  _createAccentBar(extraClass) {
    const bar = document.createElement('div');
    bar.className = `accent-bar ${extraClass}`;
    // Just 2 small stacked squares like the original
    for (let i = 0; i < 2; i++) {
      const seg = document.createElement('div');
      seg.className = 'accent-segment';
      bar.appendChild(seg);
    }
    return bar;
  }

  _updateAccentColors() {
    const color = ACCENT_COLORS[this.accentIndex % ACCENT_COLORS.length];
    const segments = this.boardEl.querySelectorAll('.accent-segment');
    segments.forEach(seg => {
      seg.style.backgroundColor = color;
    });
  }

  displayMessage(lines) {
    if (this.isTransitioning) return;
    this.isTransitioning = true;

    // Format lines into grid
    const newGrid = this._formatToGrid(lines);

    // Determine which tiles need to change
    let hasChanges = false;

    for (let r = 0; r < this.rows; r++) {
      for (let c = 0; c < this.cols; c++) {
        const newChar = newGrid[r][c];
        const oldChar = this.currentGrid[r][c];

        if (newChar !== oldChar) {
          const delay = (r * this.cols + c) * STAGGER_DELAY;
          this.tiles[r][c].scrambleTo(newChar, delay);
          hasChanges = true;
        }
      }
    }

    // Play the single transition audio clip once
    if (hasChanges && this.soundEngine) {
      this.soundEngine.playTransition();
    }

    // Update accent bar colors
    this.accentIndex++;
    this._updateAccentColors();

    // Update grid state
    this.currentGrid = newGrid;

    // Clear transitioning flag after animation completes
    setTimeout(() => {
      this.isTransitioning = false;
    }, TOTAL_TRANSITION + 200);
  }

  _formatToGrid(lines) {
    const grid = [];
    for (let r = 0; r < this.rows; r++) {
      const line = (lines[r] || '').toUpperCase();
      const padTotal = this.cols - line.length;
      const padLeft = Math.max(0, Math.floor(padTotal / 2));
      const padded = ' '.repeat(padLeft) + line + ' '.repeat(Math.max(0, this.cols - padLeft - line.length));
      grid.push(padded.split(''));
    }
    return grid;
  }
}

class MessageRotator {
  constructor(board) {
    this.board = board;
    this.messages = MESSAGES;
    this.currentIndex = -1;
    this._timer = null;
    this._paused = false;
  }

  start() {
    // Show first message immediately
    this.next();

    // Begin auto-rotation
    this._timer = setInterval(() => {
      if (!this._paused && !this.board.isTransitioning) {
        this.next();
      }
    }, MESSAGE_INTERVAL + TOTAL_TRANSITION);
  }

  stop() {
    if (this._timer) {
      clearInterval(this._timer);
      this._timer = null;
    }
  }

  next() {
    this.currentIndex = (this.currentIndex + 1) % this.messages.length;
    this.board.displayMessage(this.messages[this.currentIndex]);
    this._resetAutoRotation();
  }

  prev() {
    this.currentIndex = (this.currentIndex - 1 + this.messages.length) % this.messages.length;
    this.board.displayMessage(this.messages[this.currentIndex]);
    this._resetAutoRotation();
  }

  _resetAutoRotation() {
    // Reset timer when user manually navigates
    if (this._timer) {
      clearInterval(this._timer);
      this._timer = setInterval(() => {
        if (!this._paused && !this.board.isTransitioning) {
          this.next();
        }
      }, MESSAGE_INTERVAL + TOTAL_TRANSITION);
    }
  }
}

class KeyboardController {
  constructor(rotator, soundEngine) {
    this.rotator = rotator;
    this.soundEngine = soundEngine;

    document.addEventListener('keydown', (e) => this._handleKey(e));
  }

  _handleKey(e) {
    // Don't capture when typing in input fields
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

    switch (e.key) {
      case 'Enter':
      case ' ':
        e.preventDefault();
        this.rotator.next();
        break;

      case 'ArrowRight':
        e.preventDefault();
        this.rotator.next();
        break;

      case 'ArrowLeft':
        e.preventDefault();
        this.rotator.prev();
        break;

      case 'f':
      case 'F':
        e.preventDefault();
        this._toggleFullscreen();
        break;

      case 'm':
      case 'M':
        e.preventDefault();
        if (this.soundEngine) {
          const muted = this.soundEngine.toggleMute();
          this._showToast(muted ? 'Sound off' : 'Sound on');
        }
        break;

      case 'Escape':
        if (document.fullscreenElement) {
          document.exitFullscreen();
        }
        // Also hide shortcuts overlay
        const overlay = document.querySelector('.shortcuts-overlay');
        if (overlay) overlay.classList.remove('visible');
        break;
    }
  }

  _toggleFullscreen() {
    if (document.fullscreenElement) {
      document.exitFullscreen();
    } else {
      document.documentElement.requestFullscreen().catch(() => {});
    }
  }

  _showToast(msg) {
    let toast = document.getElementById('toast');
    if (!toast) {
      toast = document.createElement('div');
      toast.id = 'toast';
      toast.style.cssText = `
        position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
        background: rgba(0,0,0,0.8); color: #fff; padding: 8px 20px;
        border-radius: 8px; font-size: 14px; font-weight: 600;
        z-index: 9999; transition: opacity 0.3s; pointer-events: none;
      `;
      document.body.appendChild(toast);
    }
    toast.textContent = msg;
    toast.style.opacity = '1';
    clearTimeout(toast._hideTimer);
    toast._hideTimer = setTimeout(() => {
      toast.style.opacity = '0';
    }, 1200);
  }
}

document.addEventListener('DOMContentLoaded', () => {
  const boardContainer = document.getElementById('board-container');
  const soundEngine = new SoundEngine();
  const board = new Board(boardContainer, soundEngine);
  const rotator = new MessageRotator(board);
  const keyboard = new KeyboardController(rotator, soundEngine);

  // Initialize audio on first user interaction (browser autoplay policy)
  let audioInitialized = false;
  const initAudio = async () => {
    if (audioInitialized) return;
    audioInitialized = true;
    await soundEngine.init();
    soundEngine.resume();
    document.removeEventListener('click', initAudio);
    document.removeEventListener('keydown', initAudio);
  };
  document.addEventListener('click', initAudio);
  document.addEventListener('keydown', initAudio);

  // Start message rotation
  rotator.start();
  initEditor(rotator);

  // Toggle editor visibility
  const toggleEditorBtn = document.getElementById('toggle-editor-btn');
  const editorSection   = document.getElementById('editor-section');
  if (toggleEditorBtn && editorSection) {
    toggleEditorBtn.addEventListener('click', () => {
      const isOpen = editorSection.style.display !== 'none';
      editorSection.style.display = isOpen ? 'none' : '';
      toggleEditorBtn.classList.toggle('is-open', !isOpen);
    });
  }


  // Volume toggle button in header
  const volumeBtn = document.getElementById('volume-btn');
  if (volumeBtn) {
    volumeBtn.addEventListener('click', () => {
      initAudio();
      const muted = soundEngine.toggleMute();
      volumeBtn.classList.toggle('muted', muted);
    });
  }

  // "Get Early Access" button: scroll to board and go fullscreen
  const ctaBtn = document.getElementById('cta-btn');
  if (ctaBtn) {
    ctaBtn.addEventListener('click', (e) => {
      e.preventDefault();
      initAudio();
      boardContainer.scrollIntoView({ behavior: 'smooth' });
      setTimeout(() => {
        document.documentElement.requestFullscreen().catch(() => {});
      }, 400);
    });
  }
});


// ── Message Editor ────────────────────────────────────────────────────────────
function initEditor(rotator) {
  const listEl = document.getElementById('messages-list');
  const addBtn = document.getElementById('btn-add-message');
  const MAX_LEN  = 22;
  const NUM_ROWS = 5;

  // Working copy
  let msgs = rotator.messages.map(m => m.slice());

  function syncToRotator() {
    rotator.messages = msgs.map(m => m.slice());
    if (rotator.currentIndex >= rotator.messages.length) {
      rotator.currentIndex = rotator.messages.length - 1;
    }
  }

  function highlightActive() {
    listEl.querySelectorAll('.message-card').forEach((c, i) => {
      c.classList.toggle('is-active', i === rotator.currentIndex);
    });
  }

  function deleteMessage(i) {
    if (msgs.length <= 1) return;
    msgs.splice(i, 1);
    syncToRotator();
    render();
  }

  function render() {
    // Remember focus position
    const focused = document.activeElement;
    let fCard = -1, fRow = -1;
    if (focused && focused.dataset.card !== undefined) {
      fCard = +focused.dataset.card;
      fRow  = +focused.dataset.row;
    }

    listEl.innerHTML = '';

    msgs.forEach((msg, i) => {
      const card = document.createElement('div');
      card.className = 'message-card' + (i === rotator.currentIndex ? ' is-active' : '');

      // Number label
      const num = document.createElement('div');
      num.className = 'message-card-num';
      num.textContent = i + 1;

      // Input rows
      const rowsEl = document.createElement('div');
      rowsEl.className = 'message-rows';

      for (let r = 0; r < NUM_ROWS; r++) {
        const rowEl  = document.createElement('div');
        rowEl.className = 'message-row';

        const inp = document.createElement('input');
        inp.type = 'text';
        inp.maxLength = MAX_LEN;
        inp.value = msg[r] || '';
        inp.placeholder = (r === 0 || r === NUM_ROWS - 1) ? 'empty' : 'Line ' + (r + 1);
        inp.dataset.card = i;
        inp.dataset.row  = r;

        const counter = document.createElement('span');
        counter.className = 'char-count';
        const l0 = (msg[r] || '').length;
        counter.textContent = l0 > 0 ? l0 : '';
        if (l0 > MAX_LEN) counter.classList.add('over');

        inp.addEventListener('input', () => {
          msgs[i][r] = inp.value;
          const l = inp.value.length;
          counter.textContent = l > 0 ? l : '';
          counter.classList.toggle('over', l > MAX_LEN);
          syncToRotator();
        });

        rowEl.appendChild(inp);
        rowEl.appendChild(counter);
        rowsEl.appendChild(rowEl);
      }

      // Actions
      const actions = document.createElement('div');
      actions.className = 'message-card-actions';

      const previewBtn = document.createElement('button');
      previewBtn.className = 'btn-icon';
      previewBtn.title = 'Mostrar en el display';
      previewBtn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>';
      previewBtn.addEventListener('click', () => {
        syncToRotator();
        rotator.currentIndex = i - 1;
        rotator.next();
        highlightActive();
      });

      const delBtn = document.createElement('button');
      delBtn.className = 'btn-icon danger';
      delBtn.title = 'Eliminar';
      delBtn.disabled = msgs.length <= 1;
      delBtn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>';
      delBtn.addEventListener('click', () => deleteMessage(i));

      actions.appendChild(previewBtn);
      actions.appendChild(delBtn);

      card.appendChild(num);
      card.appendChild(rowsEl);
      card.appendChild(actions);
      listEl.appendChild(card);
    });

    // Restore focus without scrolling
    if (fCard >= 0 && fCard < msgs.length) {
      const inp = listEl.querySelector(`input[data-card="${fCard}"][data-row="${fRow}"]`);
      if (inp) inp.focus();
    }
  }

  // Add message
  addBtn.addEventListener('click', () => {
    msgs.push(['', '', '', '', '']);
    syncToRotator();
    render();
    requestAnimationFrame(() => {
      const last = listEl.lastElementChild;
      if (last) {
        last.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        last.querySelector('input')?.focus();
      }
    });
  });

  // Keep active card highlighted when rotator advances automatically
  const _next = rotator.next.bind(rotator);
  const _prev = rotator.prev.bind(rotator);
  rotator.next = function () { _next(); highlightActive(); };
  rotator.prev = function () { _prev(); highlightActive(); };

  render();
}

  </script>
